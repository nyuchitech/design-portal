name: Release

on:
  push:
    branches: [main]

# Runs after every merge to main.
# Creates a GitHub release when package.json version hasn't been tagged yet.
# Developers control the release cadence by bumping the version in their PR.
# If the version is already tagged (e.g. a doc-only fix on an existing version),
# the job exits cleanly — no duplicate release is created.

jobs:
  release:
    name: Auto-release on version bump
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q "v${{ steps.version.outputs.version }}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} is new — creating release."
          fi

      - uses: pnpm/action-setup@v6
        if: steps.tag_check.outputs.exists == 'false'

      - uses: actions/setup-node@v6
        if: steps.tag_check.outputs.exists == 'false'
        with:
          node-version: 22
          cache: pnpm

      - name: Install and validate
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          pnpm install --frozen-lockfile
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build
          pnpm --filter @nyuchi/design-cli build

      # Publish workspace packages to npm. Skipped silently when
      # NPM_TOKEN isn't set (e.g. forks or local act runs); on the
      # canonical repo NPM_TOKEN is configured at the org level so
      # both packages publish on every successful tag.
      #
      # `pnpm publish --no-git-checks` is required because we publish
      # AFTER `git tag` is pushed to origin (tag exists, but the
      # commit on main hasn't moved). The `--access public` flag is
      # essential for scoped packages — npm defaults scoped to
      # restricted otherwise.
      - name: Publish @nyuchi/design-cli + @nyuchi/design-agent-skills
        if: steps.tag_check.outputs.exists == 'false' && env.NPM_TOKEN != ''
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Configure npm auth (Node 22 npm respects ~/.npmrc with auth token).
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc

          # Skills package — pure markdown, no build step needed.
          pnpm --filter @nyuchi/design-agent-skills publish \
            --access public --no-git-checks

          # CLI package — already built in the validate step above.
          pnpm --filter @nyuchi/design-cli publish \
            --access public --no-git-checks

      - name: Create tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --latest
