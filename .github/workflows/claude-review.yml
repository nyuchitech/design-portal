name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude-review:
    # Review runs on every non-draft PR event (opened / synchronize / reopened /
    # ready_for_review) plus every human comment/review on a PR, regardless of
    # branch name or trigger phrase. Drafts are skipped explicitly — push as
    # many commits as you want while in draft, the action won't fire. Flipping
    # draft → ready triggers `ready_for_review`, which runs a fresh review; any
    # further commits then trigger `synchronize`, which also runs because the
    # PR is no longer a draft. Bot comments are skipped so Claude doesn't react
    # to Vercel/Supabase/dependabot/itself.
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && github.event.comment.user.type != 'Bot') ||
      (github.event_name == 'pull_request_review_comment' && github.event.comment.user.type != 'Bot') ||
      (github.event_name == 'pull_request_review' && github.event.review.user.type != 'Bot')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR (or respond to this comment/review) for the design-portal project.

            On PR open / synchronize: review the full diff.
            On a comment or review: read the comment and either answer the question directly or take the action the commenter is asking for (review the surrounding code, propose a patch, etc.). Tie the response back to the conversation thread — don't repeat a full PR review unless asked.

            Focus areas:
            - Code quality and adherence to existing patterns (CVA + Radix + cn())
            - No hardcoded colors — must use CSS custom properties from globals.css
            - Accessibility: APCA 3.0 AAA contrast, 56px default / 48px minimum touch targets
            - Brand wordmarks must be lowercase (mukoko, nyuchi, shamwari, bundu, nhimbe)
            - TypeScript strict mode compliance
            - Security vulnerabilities (OWASP top 10)
            - Registry schema compatibility (shadcn format)
            - Supabase-first architecture — source code and docs live in the DB, not the filesystem
