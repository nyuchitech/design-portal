name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude-review:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          prompt: |
            Review this PR for the design-portal project. Focus on:
            - Code quality and adherence to existing patterns (CVA + Radix + cn())
            - No hardcoded colors — must use CSS custom properties from globals.css
            - Accessibility: APCA 3.0 AAA contrast, 48px touch targets
            - Brand wordmarks must be lowercase (mukoko, nyuchi, shamwari, bundu, nhimbe)
            - TypeScript strict mode compliance
            - Security vulnerabilities (OWASP top 10)
            - Registry schema compatibility (shadcn format)
