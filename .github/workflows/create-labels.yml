name: Create Labels
on:
  push:
    paths:
      - '.github/workflows/create-labels.yml'
  workflow_dispatch:

jobs:
  create-labels:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              // Type labels
              { name: "bug", color: "d73a4a", description: "Something isn't working" },
              { name: "enhancement", color: "0047AB", description: "New feature or improvement" },
              { name: "documentation", color: "B388FF", description: "Documentation improvements" },
              { name: "question", color: "64FFDA", description: "Further information is requested" },
              { name: "security", color: "B3261E", description: "Security vulnerability or concern" },
              // Component/registry labels
              { name: "component:new", color: "0047AB", description: "Request for a new registry component" },
              { name: "component:bug", color: "d73a4a", description: "Bug in an existing component" },
              { name: "component:improvement", color: "FFD740", description: "Improvement to an existing component" },
              { name: "registry:api", color: "B388FF", description: "Related to the /api/v1/ registry API" },
              { name: "registry:mcp", color: "64FFDA", description: "Related to the MCP server" },
              { name: "registry:schema", color: "D4A574", description: "Registry schema or structure" },
              // Priority labels
              { name: "priority:critical", color: "B3261E", description: "Blocking — must fix before next release" },
              { name: "priority:high", color: "d73a4a", description: "Important — address this sprint" },
              { name: "priority:medium", color: "FFD740", description: "Should be addressed soon" },
              { name: "priority:low", color: "D4A574", description: "Nice to have" },
              // Scope labels
              { name: "scope:design-system", color: "0047AB", description: "Affects the Five African Minerals design system" },
              { name: "scope:brand", color: "B388FF", description: "Brand documentation or tokens" },
              { name: "scope:architecture", color: "64FFDA", description: "Architecture documentation or decisions" },
              { name: "scope:ecosystem", color: "D4A574", description: "Affects multiple bundu ecosystem apps" },
              { name: "scope:ci-cd", color: "FFD740", description: "CI/CD workflows and automation" },
              { name: "scope:database", color: "0047AB", description: "Supabase / database schema" },
              { name: "scope:observability", color: "64FFDA", description: "Metrics, logging, tracing" },
              // Process labels
              { name: "good first issue", color: "D4A574", description: "Good for newcomers to the codebase" },
              { name: "help wanted", color: "64FFDA", description: "Extra attention is needed" },
              { name: "breaking change", color: "B3261E", description: "Breaking change — requires consumer updates" },
              { name: "wontfix", color: "ffffff", description: "This will not be worked on" },
              { name: "duplicate", color: "cccccc", description: "This issue or PR already exists" },
              { name: "needs:reproduction", color: "FFD740", description: "Needs a minimal reproduction case" },
              { name: "needs:design", color: "B388FF", description: "Needs design work before implementation" },
            ];
            
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
                console.log(`Created: ${label.name}`);
              } catch (error) {
                if (error.status === 422) {
                  // Label exists, update it
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                  console.log(`Updated: ${label.name}`);
                } else {
                  console.error(`Failed ${label.name}: ${error.message}`);
                }
              }
            }
