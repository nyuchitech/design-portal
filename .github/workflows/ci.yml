name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Top-level default keeps the entire workflow read-only. Each job
# re-declares its own permissions so CodeQL
# (`actions/missing-workflow-permissions`) is satisfied per-job.
permissions:
  contents: read

# Job-name fields below intentionally embed the "CI / " prefix so the
# emitted check name matches the org-wide branch-protection rule
# ("CI / Build", "CI / Lint", "CI / Test", etc.). GitHub's PR UI also
# uses "<workflow> / <job>" as a visual grouping label, but the Checks
# API reports the bare job `name:` field — without the prefix here,
# branch protection sees "Build" while it's waiting for "CI / Build"
# and the required check stays in "Waiting for status to be reported".
# Same convention as `.github/workflows/lint.yml`. See CLAUDE.md §14
# "Org-wide required checks".

jobs:
  audit:
    name: CI / Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # --ignore-registry-errors keeps CI green when npmjs.org's audit
      # endpoint is degraded (the "quick" endpoint was retired in April 2026;
      # pnpm 10.x still calls it). Remove once pnpm ships a fix.
      - run: pnpm audit --audit-level=moderate --ignore-registry-errors

  registry:
    name: CI / Registry Snapshot
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify registry.json matches Supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        if: env.NEXT_PUBLIC_SUPABASE_URL != ''
        run: pnpm registry:verify

  lint:
    name: CI / Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - name: Format check
        run: pnpm exec prettier --check "**/*.{ts,tsx,js,mjs,json,md,css,yaml,yml}" --ignore-path .prettierignore

  typecheck:
    name: CI / Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: CI / Test
    runs-on: ubuntu-latest
    # Tests depend on the code being structurally sound — no point burning
    # runner minutes on `pnpm test` if eslint or tsc already failed.
    needs: [lint, typecheck]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    name: CI / Build
    runs-on: ubuntu-latest
    # Build is the terminal gate — runs only when every other CI job
    # has finished successfully. Order in `needs:` is: structural
    # (lint, typecheck) → behavioural (test) → integrity (audit,
    # registry). Adding a job above? Add it here too so build still
    # gates everything.
    needs: [audit, lint, typecheck, test, registry]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
